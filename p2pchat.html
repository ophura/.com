<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebRTC P2P Chat</title>
<style>
body{font-family:sans-serif;max-width:700px;margin:auto}
textarea{width:100%;height:120px}
#chat{border:1px solid #ccc;height:200px;overflow:auto;padding:5px}
</style>
</head>

<body>

<h2>WebRTC Chat (copy/paste signaling)</h2>

<button id="create">Create Offer</button>
<button id="accept">Accept Remote</button>

<h3>Signal</h3>
<textarea id="signal"></textarea>

<h3>Chat</h3>
<div id="chat"></div>
<input id="msg">
<button id="send">Send</button>

<script>

const chat = document.getElementById("chat")
const signalBox = document.getElementById("signal")
const msgInput = document.getElementById("msg")

function log(m){
  chat.innerHTML += m + "<br>"
}

let pc = new RTCPeerConnection({
  iceServers:[
    {urls:"stun:stun.l.google.com:19302"},
    {
      urls:"turn:openrelay.metered.ca:80",
      username:"openrelayproject",
      credential:"openrelayproject"
    }
  ]
})

let channel

pc.ondatachannel = e=>{
  channel = e.channel
  setupChannel()
}

function setupChannel(){
  channel.onopen = ()=>log("connected")
  channel.onmessage = e=>log("Peer: "+e.data)
}

let signalData = {
  desc:null,
  candidates:[]
}

pc.onicecandidate = e=>{
  if(e.candidate){
    signalData.candidates.push(e.candidate)
    updateSignal()
  }
}

function updateSignal(){
  signalBox.value = JSON.stringify(signalData,null,2)
}

document.getElementById("create").onclick = async ()=>{

  channel = pc.createDataChannel("chat")
  setupChannel()

  const offer = await pc.createOffer()
  await pc.setLocalDescription(offer)

  signalData.desc = pc.localDescription
  updateSignal()
}

document.getElementById("accept").onclick = async ()=>{

  const remote = JSON.parse(signalBox.value)

  await pc.setRemoteDescription(remote.desc)

  for(const c of remote.candidates){
    await pc.addIceCandidate(c)
  }

  if(remote.desc.type === "offer"){

    const answer = await pc.createAnswer()
    await pc.setLocalDescription(answer)

    signalData.desc = pc.localDescription
    updateSignal()
  }
}

document.getElementById("send").onclick = ()=>{
  const msg = msgInput.value

  if(channel && channel.readyState==="open"){
    channel.send(msg)
    log("You: "+msg)
    msgInput.value=""
  }
}

</script>

</body>
</html>
